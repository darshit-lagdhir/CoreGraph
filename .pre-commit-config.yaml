repos:
- repo: https://github.com/psf/black
  rev: 24.8.0
  hooks:
  - id: black
    files: ^backend/
    args: [--config, backend/pyproject.toml]

- repo: https://github.com/pycqa/flake8
  rev: 7.0.0
  hooks:
  - id: flake8
    files: ^backend/
    args: [--config, backend/.flake8]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.8.0
  hooks:
  - id: mypy
    files: ^backend/
    args: [--config-file, backend/pyproject.toml]
    additional_dependencies: [pydantic, sqlalchemy, httpx, respx, types-redis, types-requests]

- repo: https://github.com/gitleaks/gitleaks
  rev: v8.18.1
  hooks:
  - id: gitleaks

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
    args: ['--maxkb=5000']

# Module 2 Transition Guardrail: Prevent foundational drift
- repo: local
  hooks:
  - id: protect-foundation
    name: Protect Sealed Foundation
    entry: python -c "import os, sys; print('Foundation is sealed. Use ALLOW_FOUNDATION_EDIT=1 to override.') if not os.environ.get('ALLOW_FOUNDATION_EDIT') else sys.exit(0); sys.exit(1) if not os.environ.get('ALLOW_FOUNDATION_EDIT') else None"
    language: system
    files: ^backend/(core|database\.py|migrations)/
