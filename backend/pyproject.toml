[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'

[tool.mypy]
python_version = "3.13"
strict = false
ignore_missing_imports = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "networkx.*",
    "sqlalchemy.*",
    "celery.*",
    "redis.*",
    "kombu.*",
    "pako.*",
    "httpx.*",
    "respx.*"
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
