[tool.black]
line-length = 100
target-version = ['py313']
include = '\.pyi?$'

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "networkx.*",
    "sqlalchemy.*",
    "celery.*",
    "redis.*",
    "kombu.*",
    "pako.*",
    "httpx.*",
    "respx.*"
]
ignore_missing_imports = true
