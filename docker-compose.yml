version: "3.9"

# Module 4 - Task 023: Multi-Container Orchestration Manifest.
# Production-ready compose configuration adaptive to Host Sensing mappings.

services:
  engine:
    build: .
    image: coregraph-engine:latest
    container_name: coregraph_ingestion_phalanx
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coregraph_mesh
    environment:
      - DATABASE_URL=postgresql+asyncpg://coregraph_admin:coregraph_secret123@db:5432/coregraph_vault
    deploy:
      resources:
        # POTATO TIER CONSTRAINT SIMULATION (Uncomment to force limits)
        # limits:
        #   cpus: "2"
        #   memory: 4G
        reservations:
          cpus: "1"
          memory: 512M

  db:
    image: postgres:15-alpine
    container_name: coregraph_relational_vault
    restart: always
    environment:
      POSTGRES_USER: coregraph_admin
      POSTGRES_PASSWORD: coregraph_secret123
      POSTGRES_DB: coregraph_vault
      # Optimizing shared_buffers strictly for async ingestion velocity
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: 
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "synchronous_commit=off" # NVMe saturation override
    volumes:
      - coregraph_pgdata:/var/lib/postgresql/data
    networks:
      - coregraph_mesh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coregraph_admin -d coregraph_vault"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  coregraph_mesh:
    driver: bridge

volumes:
  coregraph_pgdata:
    driver: local
