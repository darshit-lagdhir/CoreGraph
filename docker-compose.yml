version: '3.8'

services:
  # ==============================================================================
  # 1. THE PERSISTENCE BEAST (PostgreSQL 15)
  # ==============================================================================
  persistence-beast:
    image: postgres:15-alpine
    container_name: coregraph-db-1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: coregraph
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - persistence_data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d
    deploy:
      resources:
        reservations:
          cpus: '4' # Reserved for low-latency B-Tree writes (P-cores)
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coregraph"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal-phalanx

  # ==============================================================================
  # 2. THE S.U.S.E. MIRROR WORLD (Task 001-007)
  # ==============================================================================
  simulation-registry:
    build:
      context: .
      dockerfile: tooling/simulation_server/Dockerfile
    container_name: coregraph-sim-1
    ports:
      - "8081:8081"
    volumes:
      - ./tooling/simulation_server/fixtures:/app/tooling/simulation_server/fixtures:ro # Immutable Ground Truth
    deploy:
      resources:
        limits:
          cpus: '8' # Pinned to Efficiency Cores for high-volume I/O
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal-phalanx

  # ==============================================================================
  # 3. THE INGESTION PHALANX (Task 008-010)
  # ==============================================================================
  ingestion-phalanx:
    build:
      context: .
      dockerfile: backend/ingestion/Dockerfile
    container_name: coregraph-ingest-1
    depends_on:
      persistence-beast:
        condition: service_healthy
      simulation-registry:
        condition: service_healthy
    environment:
      COREGRAPH_MODE: SIMULATE
      DATABASE_URL: postgresql://postgres@persistence-beast:5432/coregraph
      REGISTRY_URL: http://simulation-registry:8081
    deploy:
      resources:
        limits:
          cpus: '12' # High-compute P-cores for validation & transformation
          memory: 16G
    networks:
      - internal-phalanx

networks:
  internal-phalanx:
    driver: bridge
    name: coregraph-internal-phalanx

volumes:
  persistence_data:
    name: coregraph_persistence_v1
