services:
  # ----------------------------------------
  # THE DATABASE (PostgreSQL)
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    container_name: coregraph_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: coregraph_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coregraph_internal_network

  # ----------------------------------------
  # THE CACHE & MAILBOX (Redis)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: coregraph_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - coregraph_internal_network

  # ----------------------------------------
  # THE APPLICATION SERVER (FastAPI)
  # ----------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coregraph_api
    restart: always
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4", "--loop", "uvloop", "--http", "httptools"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - coregraph_internal_network
    depends_on:
      - db
      - redis

  # ----------------------------------------
  # THE DISTRIBUTED QUEUE (Celery)
  # ----------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coregraph_worker
    restart: always
    command: ["celery", "-A", "worker", "worker", "--loglevel=info"]
    env_file:
      - .env
    networks:
      - coregraph_internal_network
    depends_on:
      - db
      - redis
      - api

# This tells Docker to save our data permanently on your hard drive, 
# so if the container restarts, we don't lose everything!
volumes:
  postgres_data:
  redis_data:

networks:
  coregraph_internal_network:
    driver: bridge