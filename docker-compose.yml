version: "3.8"

services:
  coregraph-titan:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-null}
      - LOG_LEVEL=critical
      - WORKER_CONCURRENCY=1
      - MEMORY_LIMIT=150MB
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 150M
        reservations:
          cpus: "0.1"
          memory: 75M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/v1/swagger"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  default:
    name: coregraph_net
    driver: bridge

